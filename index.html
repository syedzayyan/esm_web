<!doctype html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="utf-8" />
        <title>Embedding t‑SNE Visualizer</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap 5 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <!-- htmx -->
        <script src="https://unpkg.com/htmx.org@1.9.12"></script>
        <!-- D3 -->
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <!-- tsne.js -->
        <script src="./tsne.js"></script>

        <style>
            body {
                background: radial-gradient(
                    circle at top,
                    #0f172a,
                    #020617 55%
                );
                color: #e5e7eb;
            }
            .app-shell {
                max-width: 1200px;
            }
            #plot {
                background-color: #020617;
            }

            /* Console at bottom */
            #log {
                background-color: #020617;
                border: 1px solid #1f2933;
                border-radius: 0.5rem;
                padding: 0.5rem 0.75rem;
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                    "Liberation Mono", "Courier New", monospace;
                font-size: 0.8rem;
                height: 150px;
                overflow-y: auto;
                margin-top: auto;
            }

            /* Progress bar */
            .progress-section {
                display: none;
            }
            .progress-section.show {
                display: block;
            }
            .download-progress {
                height: 0.5rem;
            }

            /* Footer sticky */
            .footer-log {
                position: sticky;
                bottom: 0;
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(10px);
            }
        </style>
    </head>
    <body class="d-flex flex-column min-vh-100">
        <nav
            class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary"
        >
            <div class="container app-shell">
                <a class="navbar-brand fw-semibold" href="#"
                    >Embedding t‑SNE Visualizer</a
                >
                <span
                    id="status"
                    class="navbar-text small text-secondary ms-auto"
                    >Idle</span
                >
            </div>
        </nav>

        <main class="flex-grow-1 py-3">
            <div class="container app-shell">
                <div class="row g-3">
                    <div class="col-lg-4">
                        <h2 class="h5 mb-2">Input</h2>

                        <!-- Model selection -->
                        <div class="mb-3">
                            <label for="model-select" class="form-label"
                                >Model</label
                            >
                            <select
                                id="model-select"
                                class="form-select form-select-sm"
                            >
                                <option value="facebook_esm2_t6_8M_UR50D">
                                    facebook/esm2_t6_8M_UR50D
                                </option>
                                <option value="intfloat_e5_small_v2" selected>
                                    intfloat/e5-small-v2
                                </option>
                                <option value="intfloat_e5_base_v2">
                                    intfloat/e5-base-v2
                                </option>
                                <option value="intfloat_multilingual_e5_small">
                                    intfloat/multilingual-e5-small
                                </option>
                                <option
                                    value="sentence_transformers_all_MiniLM_L6_v2"
                                >
                                    all-MiniLM-L6-v2
                                </option>
                                <option
                                    value="sentence_transformers_all_MiniLM_L12_v2"
                                >
                                    all-MiniLM-L12-v2
                                </option>
                            </select>
                            <div class="form-text text-secondary">
                                Select embedding model
                            </div>
                        </div>

                        <!-- t-SNE hyperparameters -->
                        <h3 class="h6 mt-3">t‑SNE hyperparameters</h3>
                        <div class="row g-2 mb-3">
                            <div class="col-4">
                                <label
                                    for="perplexity"
                                    class="form-label form-label-sm"
                                    >Perplexity</label
                                >
                                <input
                                    id="perplexity"
                                    type="number"
                                    class="form-control form-control-sm"
                                    value="10"
                                    min="1"
                                    step="1"
                                />
                            </div>
                            <div class="col-4">
                                <label
                                    for="iters"
                                    class="form-label form-label-sm"
                                    >Iterations</label
                                >
                                <input
                                    id="iters"
                                    type="number"
                                    class="form-control form-control-sm"
                                    value="500"
                                    min="10"
                                    step="10"
                                />
                            </div>
                            <div class="col-4">
                                <label
                                    for="epsilon"
                                    class="form-label form-label-sm"
                                    >Learning rate</label
                                >
                                <input
                                    id="epsilon"
                                    type="number"
                                    class="form-control form-control-sm"
                                    value="10"
                                    min="1"
                                    step="1"
                                />
                            </div>
                        </div>

                        <!-- Comma-separated text input -->
                        <div class="mb-3">
                            <label for="texts" class="form-label"
                                >Comma‑separated texts</label
                            >
                            <textarea
                                id="texts"
                                class="form-control"
                                rows="3"
                                placeholder="cat, dog, banana, car"
                            ></textarea>
                            <div class="form-text text-secondary">
                                If both text and FASTA provided, FASTA takes
                                precedence.
                            </div>
                        </div>

                        <!-- FASTA file input -->
                        <div class="mb-3">
                            <label for="fasta" class="form-label"
                                >FASTA file</label
                            >
                            <input
                                id="fasta"
                                type="file"
                                class="form-control"
                                accept=".fa,.fasta,.txt"
                            />
                            <div class="form-text text-secondary">
                                Each sequence = one point, labeled by header.
                            </div>
                        </div>

                        <button id="run" class="btn btn-primary mb-3 w-100">
                            Compute & Run t‑SNE
                        </button>
                    </div>

                    <div class="col-lg-5">
                        <h2 class="h5 mb-2">t‑SNE plot</h2>
                        <svg
                            id="plot"
                            width="600"
                            height="500"
                            class="border border-secondary rounded"
                        ></svg>
                    </div>

                    <div class="col-lg-3">
                        <h2 class="h5 mb-2">Progress</h2>
                        <!-- Download progress -->
                        <div
                            id="progress-section"
                            class="progress-section mb-3"
                        >
                            <div
                                class="d-flex justify-content-between small mb-1"
                            >
                                <span id="progress-label"
                                    >Downloading model...</span
                                >
                                <span id="progress-percent">0%</span>
                            </div>
                            <div class="progress" style="height: 0.5rem">
                                <div
                                    id="progress-bar"
                                    class="progress-bar"
                                    role="progressbar"
                                    style="width: 0%"
                                ></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Console log at bottom -->
        <footer class="footer-log p-3 border-top border-secondary-subtle">
            <div class="container app-shell">
                <h6 class="mb-2">Console</h6>
                <div id="log"></div>
            </div>
        </footer>

        <!-- Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Main app logic -->
        <script type="module">
            import initWasm from "./pkg/esm_rs.js";

            function logMessage(msg) {
                const log = document.getElementById("log");
                const ts = new Date().toLocaleTimeString();
                log.textContent += `[${ts}] ${msg}\n`;
                log.scrollTop = log.scrollHeight;
            }

            function setStatus(text) {
                document.getElementById("status").textContent = text;
                logMessage(text);
            }

            function showProgress(
                show = true,
                label = "Downloading model...",
                percent = 0,
            ) {
                const section = document.getElementById("progress-section");
                const bar = document.getElementById("progress-bar");
                const labelEl = document.getElementById("progress-label");
                const percentEl = document.getElementById("progress-percent");

                if (show) {
                    section.classList.add("show");
                    labelEl.textContent = label;
                    percentEl.textContent = `${percent}%`;
                    bar.style.width = `${percent}%`;
                    bar.setAttribute("aria-valuenow", percent);
                } else {
                    section.classList.remove("show");
                }
            }

            // Models config (unchanged)
            const MODELS = {
                intfloat_e5_small_v2: {
                    base_url:
                        "https://huggingface.co/intfloat/e5-small-v2/resolve/main/",
                    search_prefix: "query: ",
                    document_prefix: "passage: ",
                },
                intfloat_e5_base_v2: {
                    base_url:
                        "https://huggingface.co/intfloat/e5-base-v2/resolve/main/",
                    search_prefix: "query: ",
                    document_prefix: "passage: ",
                },
                intfloat_multilingual_e5_small: {
                    base_url:
                        "https://huggingface.co/intfloat/multilingual-e5-small/resolve/main/",
                    search_prefix: "query: ",
                    document_prefix: "passage: ",
                },
                sentence_transformers_all_MiniLM_L6_v2: {
                    base_url:
                        "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/refs%2Fpr%2F21/",
                    search_prefix: "",
                    document_prefix: "",
                },
                sentence_transformers_all_MiniLM_L12_v2: {
                    base_url:
                        "https://huggingface.co/sentence-transformers/all-MiniLM-L12-v2/resolve/refs%2Fpr%2F4/",
                    search_prefix: "",
                    document_prefix: "",
                },
                facebook_esm2_t6_8M_UR50D: {
                    base_url:
                        "https://huggingface.co/facebook/esm2_t6_8M_UR50D/resolve/main/",
                    tokenizer_url: "/tokenizer.json",
                    search_prefix: "",
                    document_prefix: "",
                },
            };

            function getModelInfo(id) {
                const m = MODELS[id];
                return {
                    modelURL: m.base_url + "model.safetensors",
                    configURL: m.base_url + "config.json",
                    tokenizerURL:
                        m.tokenizer_url ?? m.base_url + "tokenizer.json",

                    search_prefix: m.search_prefix,
                    document_prefix: m.document_prefix,
                };
            }

            // Rest unchanged: getEmbeddings, parseFasta, runTsneJs, drawScatter...

            const worker = new Worker("./worker.js", { type: "module" });

            async function getEmbeddingsForTexts(texts, modelID) {
                const { modelURL, tokenizerURL, configURL } =
                    getModelInfo(modelID);
                logMessage("Using model: " + modelID);

                // Show download progress
                showProgress(true, "Fetching model files...", 10);

                return new Promise((resolve, reject) => {
                    worker.postMessage({
                        weightsURL: modelURL,
                        tokenizerURL,
                        configURL,
                        modelID,
                        sentences: texts,
                    });

                    function messageHandler(event) {
                        const data = event.data;
                        if (data.error) {
                            showProgress(false);
                            worker.removeEventListener(
                                "message",
                                messageHandler,
                            );
                            reject(new Error(data.error));
                        }
                        if (data.status === "complete") {
                            showProgress(false);
                            worker.removeEventListener(
                                "message",
                                messageHandler,
                            );
                            resolve(data);
                        }
                        if (data.status) {
                            setStatus(data.status);
                            // Parse progress from worker status if sent (e.g. "Downloading 45%")
                            const progressMatch = data.status.match(/(\d+)%/);
                            if (progressMatch) {
                                const pct = parseInt(progressMatch[1]);
                                showProgress(true, data.status, pct);
                            }
                        }
                        if (data.downloadProgress) {
                            showProgress(
                                true,
                                data.downloadProgress.label,
                                data.downloadProgress.percent,
                            );
                        }
                    }
                    worker.addEventListener("message", messageHandler);
                });
            }
            function runTsne(embeddings, labels) {
                const perplexity = +document.getElementById("perplexity").value;
                const iters = +document.getElementById("iters").value;
                const epsilon = +document.getElementById("epsilon").value;

                const tsne = new tsnejs.tSNE({ perplexity, epsilon, dim: 2 });
                tsne.initDataRaw(embeddings);
                for (let i = 0; i < iters; i++) tsne.step();
                return tsne.getSolution(); // [[x,y], [x,y], ...]
            }

            function drawScatter(coords, labels) {
                const svg = d3.select("#plot");
                svg.selectAll("*").remove();

                const width = +svg.attr("width");
                const height = +svg.attr("height");
                const margin = 40;

                const xs = coords.map((d) => d[0]);
                const ys = coords.map((d) => d[1]);

                const xScale = d3
                    .scaleLinear()
                    .domain([d3.min(xs), d3.max(xs)])
                    .range([margin, width - margin]);
                const yScale = d3
                    .scaleLinear()
                    .domain([d3.min(ys), d3.max(ys)])
                    .range([height - margin, margin]);
                const color = d3.scaleOrdinal(d3.schemeTableau10);

                const g = svg.append("g");

                g.selectAll("circle")
                    .data(coords)
                    .join("circle")
                    .attr("cx", (d) => xScale(d[0]))
                    .attr("cy", (d) => yScale(d[1]))
                    .attr("r", 6)
                    .attr("fill", (_, i) => color(i))
                    .attr("opacity", 0.85);

                g.selectAll("text")
                    .data(coords)
                    .join("text")
                    .attr("x", (d) => xScale(d[0]) + 8)
                    .attr("y", (d) => yScale(d[1]) + 4)
                    .text((_, i) => labels[i])
                    .attr("fill", "#e5e7eb")
                    .attr("font-size", "11px");
            }

            // Run button handler (unchanged except progress)
            document
                .getElementById("run")
                .addEventListener("click", async () => {
                    const modelID =
                        document.getElementById("model-select").value;
                    const { search_prefix } = getModelInfo(modelID);

                    let texts = [];
                    let labels = [];
                    const fastaFile = document.getElementById("fasta").files[0];

                    if (fastaFile) {
                        const text = await fastaFile.text();
                        const parsed = parseFasta(text);
                        texts = parsed.map((e) => e.sequence);
                        labels = parsed.map((e) => e.header);
                    } else {
                        const raw = document.getElementById("texts").value;
                        texts = raw
                            .split(",")
                            .map((s) => s.trim())
                            .filter(Boolean);
                        labels = texts;
                    }

                    if (texts.length === 0) {
                        setStatus("No input provided.");
                        return;
                    }

                    const prefixedTexts = texts.map((t) => search_prefix + t);

                    setStatus("Computing embeddings…");
                    try {
                        const result = await getEmbeddingsForTexts(
                            prefixedTexts,
                            modelID,
                        );
                        const embeddings = result.embeddings;

                        setStatus("Running t-SNE…");
                        const coords = runTsne(embeddings, labels);
                        drawScatter(coords, labels);
                        setStatus("Done.");
                    } catch (e) {
                        setStatus("Error: " + e.message);
                    }
                });

            initWasm().then(() => logMessage("Wasm ready"));
        </script>
    </body>
</html>
