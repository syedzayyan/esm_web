        <style>
            /* ── Theme tokens ── */
            :root {
                --bg: #020617;
                --bg-panel: #0f172a;
                --border: #1e293b;
                --text: #e2e8f0;
                --muted: #64748b;
                --accent: #6366f1;
                --accent-hv: #818cf8;
                --nav-bg: rgba(15, 23, 42, 0.92);
                --input-bg: #020617;
                --grid-line: #0a0f1e;
                --dot-label: #94a3b8;
            }
            [data-theme="light"] {
                --bg: #f1f5f9;
                --bg-panel: #ffffff;
                --border: #cbd5e1;
                --text: #0f172a;
                --muted: #64748b;
                --accent: #6366f1;
                --accent-hv: #4f46e5;
                --nav-bg: rgba(255, 255, 255, 0.92);
                --input-bg: #f8fafc;
                --grid-line: #e2e8f0;
                --dot-label: #475569;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                padding: 0;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                font-size: 14px;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                transition:
                    background 0.2s,

            }

            /* ── Nav ── */
            nav {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 1.5rem;
                height: 52px;
                background: var(--nav-bg);
                border-bottom: 1px solid var(--border);
                backdrop-filter: blur(10px);
                position: sticky;
                top: 0;
                z-index: 10;
            }
            nav .brand {
                font-size: 1rem;
                font-weight: 600;
                color: var(--text);
                text-decoration: none;
            }
            .nav-right {
                display: flex;
                align-items: center;
                gap: 1rem;
            }
            #status {
                font-size: 0.75rem;
                color: var(--muted);
            }

            /* ── Theme toggle button ── */
            #theme-toggle {
                background: none;
                border: 1px solid var(--border);
                border-radius: 0.4rem;
                color: var(--muted);

                color: var(--accent);
            }
            #theme-toggle .icon {

                line-height: 1;
            }

            /* ── Layout ── */
            main {
                flex: 1;
                padding: 1.5rem;
                max-width: 1320px;
                margin: 0 auto;
                width: 100%;
            }
            .layout {
                display: grid;
                grid-template-columns: 300px 1fr 210px;
                gap: 1.25rem;
            }
            @media (max-width: 860px) {
                .layout {
                    grid-template-columns: 1fr;
                }
            }

            .panel {
                background: var(--bg-panel);
                border: 1px solid var(--border);
                border-radius: 0.75rem;
                padding: 1.25rem;
            }
            .panel h2 {

            /* ── Plot ── */

            /* ── Tooltip ── */

                word-break: break-all;

        <script type="module">
            import initWasm from "./pkg/esm_rs.js";

            /* ── Theme ── */
            const html = document.documentElement;
            const toggleBtn = document.getElementById("theme-toggle");
            const themeIcon = document.getElementById("theme-icon");
            const themeLabel = document.getElementById("theme-label");

            // Initialise from system preference
            const prefersDark = window.matchMedia(
                "(prefers-color-scheme: dark)",
            ).matches;
            let currentTheme = prefersDark ? "dark" : "light";
            applyTheme(currentTheme);

            function applyTheme(t) {
                html.setAttribute("data-theme", t);
                themeIcon.textContent = t === "dark" ? "🌙" : "☀️";
                themeLabel.textContent = t === "dark" ? "Light" : "Dark";
                currentTheme = t;
            }

            toggleBtn.addEventListener("click", () => {
                applyTheme(currentTheme === "dark" ? "light" : "dark");
            });

            // Keep in sync if user changes OS preference while page is open
            window
                .matchMedia("(prefers-color-scheme: dark)")
                .addEventListener("change", (e) => {
                    applyTheme(e.matches ? "dark" : "light");
                });
            document
                .getElementById("clear-fasta")
                .addEventListener("click", () => {
                    const input = document.getElementById("fasta");
                    input.value = ""; // resets the file picker
                    logMsg("FASTA file cleared", "info");
                });

            /* ── Logging ── */
            const logEl = document.getElementById("log");
            function logMsg(msg, kind = "info") {
                const ts = new Date().toLocaleTimeString();
                const d = document.createElement("div");
                d.innerHTML = `<span class="ts">[${ts}]</span> <span class="log-${kind}">${msg}</span>`;
                logEl.appendChild(d);
                logEl.scrollTop = logEl.scrollHeight;
            }
            function setStatus(text, kind = "info") {
                document.getElementById("status").textContent = text;
                logMsg(text, kind);
            }
            function showProgress(show, label = "Working…", pct = 0) {
                const sec = document.getElementById("progress-section");
                const idle = document.getElementById("idle-msg");
                if (show) {
                    sec.classList.add("show");
                    idle.style.display = "none";
                    document.getElementById("progress-label").textContent =
                        label;
                    document.getElementById("progress-percent").textContent =
                        pct + "%";
                    document.getElementById("progress-bar").value = pct;
                } else {
                    sec.classList.remove("show");
                    idle.style.display = "";
                }
            }

            /* ── Models ── */
            const MODELS = {
                intfloat_e5_small_v2: {
                    base_url:
                        "https://huggingface.co/intfloat/e5-small-v2/resolve/main/",
                    search_prefix: "query: ",
                },
                intfloat_e5_base_v2: {
                    base_url:
                        "https://huggingface.co/intfloat/e5-base-v2/resolve/main/",
                    search_prefix: "query: ",
                },
                intfloat_multilingual_e5_small: {
                    base_url:
                        "https://huggingface.co/intfloat/multilingual-e5-small/resolve/main/",
                    search_prefix: "query: ",
                },
                sentence_transformers_all_MiniLM_L6_v2: {
                    base_url:
                        "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/refs%2Fpr%2F21/",
                    search_prefix: "",
                },
                sentence_transformers_all_MiniLM_L12_v2: {
                    base_url:
                        "https://huggingface.co/sentence-transformers/all-MiniLM-L12-v2/resolve/refs%2Fpr%2F4/",
                    search_prefix: "",
                },
                facebook_esm2_t6_8M_UR50D: {
                    base_url:
                        "https://huggingface.co/facebook/esm2_t6_8M_UR50D/resolve/main/",
                    tokenizer_url:
                        "https://raw.githubusercontent.com/syedzayyan/esm_web/refs/heads/main/tokenizer.json",
                    search_prefix: "",
                    max_len: 512, // ← ESM2 hard cap to avoid wasm32 capacity overflow
                },
            };

            function getModelInfo(id) {
                const m = MODELS[id];
                return {
                    modelURL: m.base_url + "model.safetensors",
                    configURL: m.base_url + "config.json",
                    tokenizerURL:
                        m.tokenizer_url ?? m.base_url + "tokenizer.json",
                    search_prefix: m.search_prefix,
                    max_len: m.max_len ?? null,
                };
            }

            /* ── FASTA parser ── */
            function parseFasta(raw) {
                const results = [];
                const chunks = raw
                    .replace(/\r\n/g, "\n")
                    .replace(/\r/g, "\n")
                    .split(/^>/m);
                for (const chunk of chunks) {
                    const trimmed = chunk.trim();
                    if (!trimmed) continue;
                    const nl = trimmed.indexOf("\n");
                    if (nl === -1) continue;
                    const header = trimmed.slice(0, nl).trim();
                    const sequence = trimmed
                        .slice(nl + 1)
                        .split("\n")
                        .map((l) => l.trim())
                        .filter((l) => l && !l.startsWith(";"))
                        .join("");
                    if (header && sequence) results.push({ header, sequence });
                }
                return results;
            }

            /* ── Worker ── */
            const worker = new Worker("./worker.js", { type: "module" });

            async function getEmbeddings(texts, modelID) {
                const { modelURL, tokenizerURL, configURL } =
                    getModelInfo(modelID);
                logMsg("Loading model: " + modelID);
                showProgress(true, "Fetching model files…", 5);

                return new Promise((resolve, reject) => {
                    worker.postMessage({
                        weightsURL: modelURL,
                        tokenizerURL,
                        configURL,
                        modelID,
                        sentences: texts,
                    });

                    function handler(ev) {
                        const d = ev.data;
                        if (d.error) {
                            showProgress(false);
                            worker.removeEventListener("message", handler);
                            reject(new Error(d.error));
                        }
                        if (d.status === "complete") {
                            showProgress(false);
                            worker.removeEventListener("message", handler);
                            resolve(d);
                        }
                        if (d.status) {
                            setStatus(d.status);
                            const m = d.status.match(/(\d+)%/);
                            if (m) showProgress(true, d.status, +m[1]);
                        }
                        if (d.downloadProgress) {
                            showProgress(
                                true,
                                d.downloadProgress.label,
                                d.downloadProgress.percent,
                            );
                        }
                    }
                    worker.addEventListener("message", handler);
                });
            }

            /* ── t-SNE ── */
            function runTsne(embeddings) {
                const perplexity = +document.getElementById("perplexity").value;
                const iters = +document.getElementById("iters").value;
                const epsilon = +document.getElementById("epsilon").value;
                const tsne = new tsnejs.tSNE({ perplexity, epsilon, dim: 2 });
                tsne.initDataRaw(embeddings);
                for (let i = 0; i < iters; i++) tsne.step();
                return tsne.getSolution();
            }

            /* ── D3 scatter — hover-only labels ── */
            function drawScatter(coords, labels) {
                const svgEl = document.getElementById("plot");
                const d3svg = d3.select(svgEl);
                d3svg.selectAll("*").remove();

                const W = svgEl.clientWidth || 560;
                const H = svgEl.clientHeight || 490;
                const M = { top: 28, right: 28, bottom: 52, left: 52 };
                const iW = W - M.left - M.right;
                const iH = H - M.top - M.bottom;

                d3svg.attr("viewBox", `0 0 ${W} ${H}`);

                const xs = coords.map((c) => c[0]);
                const ys = coords.map((c) => c[1]);

                function paddedDomain(arr) {
                    const mn = d3.min(arr),
                        mx = d3.max(arr);
                    const p = (mx - mn || 1) * 0.1;
                    return [mn - p, mx + p];
                }

                const xScale = d3
                    .scaleLinear()
                    .domain(paddedDomain(xs))
                    .range([0, iW]);
                const yScale = d3
                    .scaleLinear()
                    .domain(paddedDomain(ys))
                    .range([iH, 0]);
                const color = d3.scaleOrdinal(d3.schemeTableau10);

                const g = d3svg
                    .append("g")
                    .attr("transform", `translate(${M.left},${M.top})`);

                g.append("g")
                    .attr("class", "grid")
                    .attr("transform", `translate(0,${iH})`)
                    .call(d3.axisBottom(xScale).tickSize(-iH).tickFormat(""));
                g.append("g")
                    .attr("class", "grid")
                    .call(d3.axisLeft(yScale).tickSize(-iW).tickFormat(""));

                g.append("g")
                    .attr("class", "axis")
                    .attr("transform", `translate(0,${iH})`)
                    .call(d3.axisBottom(xScale).ticks(5));
                g.append("text")
                    .attr("class", "axis-label")
                    .attr("x", iW / 2)
                    .attr("y", iH + 44)
                    .attr("text-anchor", "middle")
                    .text("t-SNE Dimension 1");

                g.append("g")
                    .attr("class", "axis")
                    .call(d3.axisLeft(yScale).ticks(5));
                g.append("text")
                    .attr("class", "axis-label")
                    .attr("transform", "rotate(-90)")
                    .attr("x", -iH / 2)
                    .attr("y", -44)
                    .attr("text-anchor", "middle")
                    .text("t-SNE Dimension 2");

                const tooltip = document.getElementById("tooltip");

                g.selectAll("circle")
                    .data(coords)
                    .join("circle")
                    .attr("cx", (d) => xScale(d[0]))
                    .attr("cy", (d) => yScale(d[1]))
                    .attr("r", 7)
                    .attr("fill", (_, i) => color(i))
                    .attr("opacity", 0.88)
                    .attr("stroke", "var(--bg)")
                    .attr("stroke-width", 1.5)
                    .style("cursor", "pointer")
                    .on("mousemove", function (ev, d) {
                        const i = coords.indexOf(d);
                        const lbl = labels[i];
                        // Show full label in tooltip — truncated display only in tooltip title
                        tooltip.style.display = "block";
                        tooltip.style.left = ev.clientX + 14 + "px";
                        tooltip.style.top = ev.clientY - 10 + "px";
                        tooltip.innerHTML = `<strong style="color:${color(i)}">#${i + 1}</strong> ${lbl}`;
                    })
                    .on("mouseleave", () => (tooltip.style.display = "none"));

                // No static dot-labels — tooltip is the sole label mechanism,
                // preventing overlap clutter on dense plots.
            }

            /* ── Button handler ── */
            document
                .getElementById("run")
                .addEventListener("click", async () => {
                    const btn = document.getElementById("run");
                    const modelID =
                        document.getElementById("model-select").value;
                    const { search_prefix, max_len } = getModelInfo(modelID);

                    let texts = [],
                        labels = [];
                    const fastaFile = document.getElementById("fasta").files[0];

                    if (fastaFile) {
                        const raw = await fastaFile.text();
                        const parsed = parseFasta(raw);
                        if (!parsed.length) {
                            setStatus(
                                "No sequences parsed from FASTA file.",
                                "err",
                            );
                            return;
                        }
                        texts = parsed.map((e) => e.sequence);
                        labels = parsed.map((e) => e.header);
                        logMsg(
                            `Parsed ${parsed.length} FASTA sequence(s)`,
                            "ok",
                        );
                    } else {
                        const raw = document.getElementById("texts").value;
                        texts = raw
                            .split(",")
                            .map((s) => s.trim())
                            .filter(Boolean);
                        labels = [...texts];
                    }

                    if (!texts.length) {
                        setStatus("No input provided.", "err");
                        return;
                    }
                    if (texts.length < 3) {
                        setStatus("Need ≥ 3 inputs for t-SNE.", "err");
                        return;
                    }

                    // ESM2 guard — truncate to avoid wasm32 capacity overflow in MatMul
                    if (max_len) {
                        const before = texts.filter(
                            (t) => t.length > max_len,
                        ).length;
                        texts = texts.map((t) => t.slice(0, max_len));
                        if (before)
                            logMsg(
                                `ESM2: truncated ${before} sequence(s) to ${max_len} residues`,
                                "info",
                            );
                    }

                    btn.disabled = true;
                    try {
                        setStatus("Computing embeddings…");
                        const result = await getEmbeddings(
                            texts.map((t) => search_prefix + t),
                            modelID,
                        );
                        setStatus("Running t-SNE…");
                        const coords = runTsne(result.embeddings);
                        drawScatter(coords, labels);
                        setStatus(
                            `Done — ${texts.length} points plotted.`,
                            "ok",
                        );
                    } catch (e) {
                        setStatus("Error: " + e.message, "err");
                    } finally {
                        btn.disabled = false;
                    }
                });

            initWasm().then(() => logMsg("Wasm ready", "ok"));
        </script>
    </body>
</html>
